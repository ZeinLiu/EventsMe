name: Daily Event Discovery

on:
  schedule:
    - cron: '0 18 * * *'   # 6 pm UTC = 2 am SGT (next day)
  workflow_dispatch:

jobs:
  discover:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Run Discovery Scheduler
        run: |
          echo "=== Run Scheduler ==="
          curl -s -X POST \
            "${{ secrets.SUPABASE_URL }}/functions/v1/run-scheduler" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"scheduled": true}' \
            --max-time 900 \
            | tee /tmp/scheduler.json
          echo ""
          echo "Exit: $?"

      - name: Print summary
        if: always()
        run: |
          echo "===== SCHEDULER SUMMARY ====="
          python3 -c "
          import sys, json
          try:
            with open('/tmp/scheduler.json') as f:
              d = json.load(f)
            print(f'Ran: {d.get(\"ran\", 0)} sources')
            print(f'Tokens delta: {d.get(\"tokensDelta\", 0):,}')
            for r in d.get('results', []):
              status = r.get('status', '?')
              name   = r.get('source', '?')
              events = r.get('events', 0)
              tokens = r.get('tokens', 0)
              ms     = r.get('durationMs', 0)
              print(f'  [{status.upper():7s}] {name} — {events} events, {tokens:,} tokens ({ms}ms)')
            if d.get('skipped'):
              print(f'Skipped: {d.get(\"reason\")}')
          except Exception as e:
            print('Could not parse output:', e)
          " || cat /tmp/scheduler.json
